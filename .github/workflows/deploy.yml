name: CI/CD Pipeline of get-rc-web

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}

      - name: Copy project to Hostinger VPS
        uses: appleboy/scp-action@v0.1.7
        env:
          APP_DIR: /var/www/get-rc-web
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          source: "."
          target: ${{ env.APP_DIR }}
          rm: true
          overwrite: true

      - name: Deploy and run with PM2
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: /var/www/get-rc-web
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          envs: APP_DIR
          script: |
            set -e
            cd "$APP_DIR"
            npm ci
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }} npm run build
            sudo npm install -g pm2
            pm2 delete get-rc-web || true
            VITE_BASE_URL=${{ secrets.VITE_BASE_URL }} pm2 start npm --name get-rc-web -- run preview -- --host 0.0.0.0 --port 3000
            pm2 save
